<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Splash Screen - Mohamed Shazan</title>

  <link rel="stylesheet" href="Global.css">

  <style>
    body {
      margin: 0;
      font-family: Georgia, 'Times New Roman', serif;
      /* Matching team default font */
      background-color: #030929;
      display: flex;
      align-items: center;
      /*to make the content stays in the*/
      justify-content: center;
      text-align: center;

      /*full screen background image only for splash screen*/
      /* Reference: iStockPhoto - [EDUCATION], [https://www.istockphoto.com/photo/students-raising-hands-while-teacher-asking-them-questions-in-classroom-gm1409722748-460173834] */
      background-image: url('images/SplashScreenImage.jpg');
      
      /* Scale image to cover full screen */
      background-size: cover;
      /* Centre the image */
      background-position: center;
      /* Full viewport height */
      min-height: 100vh;

      /*background-repeat: no-repeat;*/
    }

    .background {
      z-index: 0;
      background-color: rgba(3, 9, 41, 0.78);
      /* Team navy #030929 at 78% opacity */
      position: fixed;
      /* Cover entire screen */
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .splashScreen {
      padding: 20px;
      max-width: 720px;
      border: solid 2px;
      border-radius: 15px;
      border-color: darkcyan;
      z-index: 1;
      text-align: center;
    }

    h1 {
      font-size: 42px;
      font-weight: bold;
      /*color: #1f2937;*/
      color: white;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    /*header underline*/
    .title-underLine {
      width: 80px;
      height: 3px;
      background-color: gold;
      border-radius: 2px;
      margin: auto;
    }

    /*mission paragraph css*/
    .mission-text {
      font-size: 16px;
      /*color: #1f2937;*/
      color: white;
      line-height: 1.7;
      margin-bottom: 30px;
      font-style: italic;
      letter-spacing: 1px;
    }

    /*countdown texts*/
    #countdown {
      font-size: 24px;
      font-weight: bold;
      /*color: #1f2937;*/
      color: white;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 20px;
      background-color: #486186;
      border: solid 2px #121212;
      border-radius: 27px;
      transition: background-color 0.4s;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background-color: white;
      color: #486186;
      transition: all 0.5s;
    }

    button:active {
      border: 4px solid #486186;
      background-color: #121212;
      color: white;
      transition: all 0.5s;
    }

    .team-label {
      margin-top: 30px;
      margin-bottom: 10px;
      color: white;
      letter-spacing: 3px;
      font-size: 20px;
    }

    .memberNames {
      color: #ffffff;
      font-size: 18px;
      letter-spacing: 3px;

    }

    /*animation loader using css*/
    .loader {
      margin-bottom: 20px;
      margin-right: auto;
      margin-left: auto;
      border: 4px solid #e5e7eb;
      border-top: 4px solid #374151;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
    }

    /* Keyframe animation for the spinning loader*/
    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /*mobile responsiveness*/
    @media (max-width: 849.50px) {
      h1 {
        font-size: 28px;
      }

      .splashScreen {
        padding: 35px 25px;
      }

      .mission-text {
        font-size: 14px;
      }
    }
  </style>

</head>

<body>

  <!--Splash Screen Part-->
  <div class="background"></div>

  <div class="splashScreen">

    <h1 class="SplashHead">
      LearnScape
    </h1>

    <div class="title-underLine"></div>

    <p class="mission-text">
      Empowering individuals and communities through accessible, inclusive, and action-focused
      education - because learning is the foundation of every positive change in the world
    </p>

    <!--loader animation-->
    <div class="loader"></div>

    <div id="countdown">Entering site in 4...</div>

    <!--skip intro button-->
    <button class="skipButton" onclick="skipIntro()">Skip Intro</button>

    <br>
    <br>

    <div>
      <p class="team-label">OUR MEMBERS</p>
      <p class="memberNames">Sachithra | Shazan | Chathuni | Yehan</p>
    </div>

  </div>




  <script>
    //Store the countdown starting value (4 seconds, matching meta refresh)
    let countdown = 4;
    const countdownElement = document.getElementById('countdown');

    const interval = setInterval(() => {
      countdown--;
      if (countdown > 0) {
        //updating the number
        countdownElement.textContent = `Entering site in ${countdown}...`;
      }
      else {
        //after reaching zero, stoping the interval
        clearInterval(interval);
        window.location.href = "home.html";
      }
    }, 1000); //runs every 1 second

    //skip intro button function
    function skipIntro() {
      //stope the timer first
      clearInterval(interval);
      //after stopping the timer, it will redirect you to home page
      window.location.href = "home.html";
    }

  </script>

</body>

</html>
